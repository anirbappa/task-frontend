name: CI/CD Pipeline Build Check & Deploy

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci || npm install

      - name: Lint Verification Run
        run: |
          # If your template doesn't have a linter script configured yet, 
          # this syntax ensures the build won't hard break out of the box.
          npm run lint --if-present

      - name: Execute Test Suite
        run: npm test --if-present

  build-and-ship:
    needs: validate-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FOR FRONTEND REPOSITORY DOCKER BUILD:
      - name: Build and Push Frontend Container (With Secrets Injection)
        if: github.event.repository.name == 'task-frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:latest
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.BACKEND_IP }}:5000

      - name: Setup Node.js Runtime Environment (Host)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies (Host)
        run: npm ci || npm install

      - name: Generate Production Build Assets (Host)
        run: npm run build
        env:
          REACT_APP_API_URL: http://${{ secrets.BACKEND_IP }}:5000

      # AWS S3 DEPLOYMENT:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync Build Assets to AWS S3
        run: |
          # Syncs the compiled 'build' folder to S3 and removes deleted files automatically
          aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete
